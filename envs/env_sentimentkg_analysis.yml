name: sentimentkg-analysis
# ──────────────────────────────────────────────────────────────────────────────
# Environment for:  sentimentkg_analysis.ipynb
# Python version:   3.12  (modern; no BERT/PyTorch dependency)
#
# Setup steps after creating this environment:
#   1. conda env create -f env_sentimentkg_analysis.yml
#   2. conda activate sentimentkg-analysis
#   3. Set the notebook kernel to "sentimentkg-analysis"
#        (Jupyter will detect it automatically via ipykernel)
# ──────────────────────────────────────────────────────────────────────────────

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - pip

  # ── Data ──────────────────────────────────────────────────────────────────
  - pandas>=2.0               # DataFrame I/O and manipulation
  - numpy>=1.26               # Numerical operations

  # ── Visualisation ─────────────────────────────────────────────────────────
  - matplotlib>=3.8           # Violin, box, histogram, scatter plots
  - scipy>=1.12               # gaussian_kde for KDE overlays

  # ── Machine learning utilities ─────────────────────────────────────────────
  - scikit-learn>=1.4         # cosine_similarity

  # ── Network analysis ───────────────────────────────────────────────────────
  - networkx>=3.2             # Graph construction and centrality metrics
  - python-louvain>=0.16      # community_louvain (Louvain community detection)

  # ── Jupyter ────────────────────────────────────────────────────────────────
  - ipykernel>=6.0            # Registers environment as a Jupyter kernel
