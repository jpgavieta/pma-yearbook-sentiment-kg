name: sentimentkg-build
# ──────────────────────────────────────────────────────────────────────────────
# Environment for:  sentimentkg_build.ipynb
# Python version:   3.7.16  (required by the ABSA BERT classifier)
#
# Setup steps after creating this environment:
#   1. conda env create -f env_sentimentkg_build.yml
#   2. conda activate sentimentkg-build
#   3. python -m spacy download en_core_web_sm
#   4. pip install -e .   (run inside the cloned ABSA repo directory)
#
# ABSA repo:
#   git clone https://github.com/ScalaConsultants/Aspect-Based-Sentiment-Analysis.git
#   cd Aspect-Based-Sentiment-Analysis
# ──────────────────────────────────────────────────────────────────────────────

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.7.16
  - pip

  # ── Data ──────────────────────────────────────────────────────────────────
  - pandas>=1.3,<2.0          # DataFrame I/O; <2.0 for Python 3.7 compatibility

  # ── NLP ───────────────────────────────────────────────────────────────────
  - spacy=3.4.*               # Dependency parsing for aspect extraction
                              # Post-install: python -m spacy download en_core_web_sm

  # ── Deep learning (ABSA pipeline) ─────────────────────────────────────────
  - pip:
    - transformers==4.18.*    # BertTokenizer + model loading
    - torch==1.13.*           # Backend required by the ABSA classifier
    - aspect-based-sentiment-analysis  # pip install -e . from cloned repo
                                       # (installs as editable from local clone)
